<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Medical Exposure VR – VR Therapy Hub</title>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script>
    if (!localStorage.getItem('token')) {
        window.location.href = 'login.html';
    }
  </script>
</head>
<body>
  <a-scene background="color: #f0faff" shadow="type: pcfsoft" bloom>
    <!-- Assets -->
    <a-assets>
      <img id="wall-texture" src="https://images.pexels.com/photos/1103970/pexels-photo-1103970.jpeg?auto=compress&cs=tinysrgb&w=1260&h=750&dpr=1" crossorigin="anonymous">
      <img id="monitor-ui" src="https://images.pexels.com/photos/3183150/pexels-photo-3183150.jpeg?auto=compress&cs=tinysrgb&w=1260&h=750&dpr=1" crossorigin="anonymous">
      <img id="blood-texture" src="https://images.pexels.com/photos/208580/pexels-photo-208580.jpeg?auto=compress&cs=tinysrgb&w=300" crossorigin="anonymous">
      <!-- Direct Audio Link for Heartbeat -->
      <audio id="heart-beep" src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg" preload="auto" crossorigin="anonymous"></audio>
      <audio id="hospital-hum" src="https://actions.google.com/sounds/v1/ambiences/hospital_waiting_room.ogg" preload="auto" crossorigin="anonymous"></audio>
    </a-assets>

    <!-- Global Lighting (BRIGHTER) -->
    <a-entity light="type: ambient; intensity: 0.8; color: #ffffff"></a-entity>
    <a-entity light="type: directional; intensity: 0.5; color: #ffffff" position="1 4 3"></a-entity>
    
    <!-- Environment: Surgery Floor (PLAIN WHITE) -->
    <a-plane rotation="-90 0 0" width="20" height="20" 
             color="#ffffff" material="roughness: 0.2; metalness: 0.1" shadow="receive: true"></a-plane>

    <!-- Ceilings and Walls (BRIGHTER WHITE) -->
    <a-plane position="0 5 0" rotation="90 0 0" width="20" height="20" color="#ffffff" material="roughness: 0.9"></a-plane>
    <a-box position="0 2.5 -10" width="20" height="5" depth="0.5" color="#ffffff" material="src: #wall-texture; repeat: 4 2; roughness: 0.6"></a-box>
    <a-box position="10 2.5 0" rotation="0 -90 0" width="20" height="5" depth="0.5" color="#ffffff" material="src: #wall-texture; repeat: 4 2; roughness: 0.6"></a-box>
    <a-box position="-10 2.5 0" rotation="0 90 0" width="20" height="5" depth="0.5" color="#ffffff" material="src: #wall-texture; repeat: 4 2; roughness: 0.6"></a-box>
    <a-box position="0 2.5 10" rotation="0 180 0" width="20" height="5" depth="0.5" color="#ffffff" material="src: #wall-texture; repeat: 4 2; roughness: 0.6"></a-box>

    <!-- Advanced Operating Table -->
    <a-entity position="0 0.8 0">
        <!-- Main Pedestal -->
        <a-cylinder radius="0.4" height="0.8" color="#dcdde1" material="metalness: 0.9; roughness: 0.1" position="0 -0.4 0"></a-cylinder>
        <a-box width="1.2" height="0.15" depth="1.2" color="#f5f6fa" position="0 -0.8 0"></a-box>
        
        <!-- Table Top -->
        <a-box width="0.8" height="0.15" depth="2.2" color="#353b48" material="roughness: 0.3"></a-box>
        
        <!-- Blue Surgical Sheet/Drape -->
        <a-box width="0.81" height="0.05" depth="2.1" position="0 0.1 0" color="#487eb0" material="roughness: 0.8">
            <!-- Blood Stains on Sheet -->
            <a-plane position="0 0.03 0.4" rotation="-90 0 0" width="0.3" height="0.3" src="#blood-texture" material="transparent: true; opacity: 0.7; color: #ff0000"></a-plane>
            <a-plane position="-0.1 0.03 0.6" rotation="-90 45 0" width="0.2" height="0.2" src="#blood-texture" material="transparent: true; opacity: 0.5; color: #ff0000"></a-plane>
        </a-box>
        
        <!-- Headrest -->
        <a-box width="0.4" height="0.1" depth="0.4" position="0 0.1 -1.3" color="#487eb0" material="roughness: 0.8"></a-box>
    </a-entity>

    <!-- Medical Staff NPCs (BRIGHTER) -->
    
    <!-- Surgeon (Chief) -->
    <a-entity position="-0.85 0 0" rotation="0 90 0">
        <a-cylinder radius="0.3" height="1.8" color="#00a8ff" position="0 0.9 0"></a-cylinder>
        <a-sphere radius="0.22" position="0 1.9 0" color="#fbc531" rotation="15 0 0">
            <a-box width="0.25" height="0.12" depth="0.05" position="0 -0.1 0.22" color="#ffffff"></a-box> <!-- Mask -->
            <a-sphere radius="0.22" color="#00a8ff" scale="1 0.4 1" position="0 0.18 0"></a-sphere> <!-- Cap -->
        </a-sphere>
        <a-entity sound="src: #hospital-hum; autoplay: true; volume: 0.1; loop: true"></a-entity>
    </a-entity>

    <!-- Assistant -->
    <a-entity position="0.85 0 -0.5" rotation="0 -90 0">
        <a-cylinder radius="0.25" height="1.7" color="#4cd137" position="0 0.85 0"></a-cylinder>
        <a-sphere radius="0.2" position="0 1.8 0" color="#fbc531">
            <a-box width="0.25" height="0.12" depth="0.05" position="0 -0.1 0.22" color="#ffffff"></a-box>
            <a-sphere radius="0.2" color="#4cd137" scale="1 0.3 1" position="0 0.18 0"></a-sphere>
        </a-sphere>
    </a-entity>

    <!-- Anesthesiologist -->
    <a-entity position="0 0 -1.8" rotation="0 0 0">
        <a-cylinder radius="0.25" height="1.75" color="#4cd137" position="0 0.87 0"></a-cylinder>
        <a-sphere radius="0.21" position="0 1.85 0" color="#fbc531">
            <a-box width="0.25" height="0.12" depth="0.05" position="0 -0.1 0.22" color="#ffffff"></a-box>
        </a-sphere>
    </a-entity>

    <!-- Surgical Boom Lights (EXTRA BRIGHT) -->
    <a-entity position="0 4.5 0">
        <a-cylinder radius="0.08" height="1.2" position="0 -0.6 0" color="#f5f6fa" material="metalness: 1"></a-cylinder>
        <a-entity position="0 -1.5 0">
            <a-entity position="0.6 0 0" rotation="65 0 0">
                <a-cylinder radius="0.6" height="0.12" color="#ffffff" material="metalness: 0.9"></a-cylinder>
                <a-sphere radius="0.55" scale="1 0.1 1" position="0 -0.05 0" color="#ffffff" material="emissive: #ffffff; emissiveIntensity: 5; shader: flat"></a-sphere>
                <a-entity light="type: spot; intensity: 6; angle: 25; color: #ffffff; castShadow: true" position="0 -0.3 0" rotation="-90 0 0"></a-entity>
            </a-entity>
        </a-entity>
    </a-entity>

    <!-- Vital Sign Monitor (Beeping FIXED) -->
    <a-entity position="-3.5 0 -4">
        <a-box width="1.2" height="1.8" depth="1" color="#f5f6fa" material="roughness: 0.1; metalness: 0.1"></a-box>
        <a-box width="0.9" height="0.6" depth="0.1" position="0 0.5 0.51" color="#000000">
            <a-plane src="#monitor-ui" width="0.85" height="0.55" position="0 0 0.01"></a-plane>
        </a-box>
        <!-- Heartbeat Beeper (Repeating audio) -->
        <a-entity sound="src: #heart-beep; autoplay: true; loop: true; volume: 0.3; refDistance: 1; rolloffFactor: 1"></a-entity>
    </a-entity>

    <!-- Camera (User as Patient) -->
    <a-entity id="rig" position="0 1.15 0" rotation="0 0 0">
        <a-entity camera look-controls wasd-controls position="0 0 0">
            <a-cursor color="#ffffff" material="opacity: 0.1"></a-cursor>
            <!-- Lowers the darkness of vignette -->
            <a-sphere radius="0.5" material="shader: flat; side: double; color: #000; opacity: 0.15; transparent: true" 
                      scale="1 1 -1" position="0 0 -0.1"></a-sphere>
        </a-entity>
    </a-entity>

    <!-- Bright Corner Fill Lights to ensure room isn't dark -->
    <a-entity light="type: point; intensity: 0.4; distance: 15" position="-8 4 -8"></a-entity>
    <a-entity light="type: point; intensity: 0.4; distance: 15" position="8 4 8"></a-entity>
    <a-entity light="type: point; intensity: 0.4; distance: 15" position="-8 4 8"></a-entity>
    <a-entity light="type: point; intensity: 0.4; distance: 15" position="8 4 -8"></a-entity>

  </a-scene>

  <style>
    body { margin: 0; overflow: hidden; background-color: #f0faff; }
    .overlay-message {
        position: fixed;
        bottom: 25px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 1000;
        background: rgba(255, 255, 255, 0.9);
        color: #2f3640;
        padding: 12px 25px;
        border-radius: 40px;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        font-weight: 600;
        pointer-events: none;
        text-align: center;
        box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        border: 2px solid #00a8ff;
    }
  </style>
  <div class="overlay-message">
    VIRTUAL CLINICAL SESSION: ACTIVE<br>
    <small style="opacity: 0.7; font-weight: 400;">Breathe normally. You are under expert supervision.</small>
  </div>
  <a href="index.html" style="position:fixed; top:20px; left:20px; z-index:1000; color:white; text-decoration:none; background:#00a8ff; padding:10px 20px; border-radius:30px; font-weight: 600; box-shadow: 0 5px 15px rgba(0,168,255,0.3);">← Exit Session</a>
  <script>
    // Ensure sounds start on first user interaction
    window.addEventListener('click', () => {
      const scene = document.querySelector('a-scene');
      const sounds = scene.querySelectorAll('[sound]');
      sounds.forEach(s => {
        if (s.components.sound) s.components.sound.playSound();
      });
    }, { once: true });
  </script>
</body>
</html>
