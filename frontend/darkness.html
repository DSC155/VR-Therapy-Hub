<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Darkness Therapy - Dark Room</title>
    <!-- Add A-Frame CDN -->
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script>
        if (!localStorage.getItem('token')) {
            window.location.href = 'login.html';
        }
    </script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        
        #ui-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none; /* Let touches pass through to VR */
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px;
            box-sizing: border-box;
            animation: fadeIn 2s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .top-bar {
            pointer-events: auto; /* Re-enable clicks for buttons */
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            width: 100%;
        }

        .back-btn {
            background: rgba(15, 23, 42, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            padding: 10px 20px;
            border-radius: 8px;
            text-decoration: none;
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            gap: 8px;
            font-family: inherit;
            transition: all 0.3s ease;
        }

        .back-btn:hover {
            background: rgba(15, 23, 42, 0.9);
            color: #06B6D4;
        }

        .overlay-center {
            pointer-events: auto;
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            background: rgba(15, 23, 42, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(5px);
            padding: 20px 30px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }

        .overlay-title {
            color: #ccc;
            margin: 0 0 15px 0;
            font-size: 1.5rem;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
        }

        .btn-start {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-start:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body>
    <div id="ui-overlay">
        <div class="top-bar">
            <a href="index.html" class="back-btn">
                <i class="fas fa-arrow-left"></i> Exit Simulator
            </a>
        </div>
        <div class="overlay-center">
            <h2 class="overlay-title">Darkness Therapy</h2>
            <button class="btn-start" onclick="handleStart()">Start Session</button>
        </div>
    </div>

    <a-scene background="color: #000" renderer="colorManagement: true;">
        <!-- Camera Config -->
        <a-entity id="rig" position="0 1.6 0">
            <a-camera look-controls wasd-controls="enabled: false"></a-camera>
        </a-entity>

        <!-- Dark environment -->
        <a-sky color="#000000"></a-sky>

        <!-- Small dim light -->
        <a-light id="room-light" type="point" intensity="0.2" position="0 2 0"></a-light>

        <!-- Ground -->
        <a-plane position="0 0 0" rotation="-90 0 0" width="10" height="10" color="#111"></a-plane>
    </a-scene>

    <script src="app.js"></script>
    <script>
        function handleStart() {
            if(window.startDarkness) {
                window.startDarkness();
            } else {
                alert("Entering Dark Room...");
            }
            // Gentle pulse effect mimicking breathing for realism
            const light = document.querySelector('#room-light');
            light.setAttribute('animation__pulse', 'property: light.intensity; from: 0.1; to: 0.3; dir: alternate; dur: 3500; loop: true; easing: easeInOutSine');
        }
    </script>
</body>
</html>
