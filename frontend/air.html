<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Calm Flight VR — A-Frame</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script>
    if (!localStorage.getItem('token')) {
        window.location.href = 'login.html';
    }
  </script>
    <style>
      body { margin: 0; background: #000; }
    </style>
  </head>
  <body>
    <a-scene renderer="colorManagement: true; antialias: true" background="color: #0b0f1a">
      <!-- ASSETS -->
      <a-assets>
        <!-- Online Plane Cabin White Noise -->
        <audio id="engine" src="https://actions.google.com/sounds/v1/transportation/airplane_cabin_hum.ogg" preload="auto" crossorigin="anonymous"></audio>
        <!-- Seatbelt ding -->
        <audio id="seatbelt" src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg" preload="auto" crossorigin="anonymous"></audio>
        <img id="fabric" src="https://cdn.aframe.io/a-painter/images/floor.jpg" crossorigin="anonymous" />
      </a-assets>

      <!-- LIGHTING -->
      <a-entity light="type: ambient; intensity: 0.55"></a-entity>
      <a-entity light="type: directional; intensity: 0.6; castShadow: true" position="0 3 2"></a-entity>

      <!-- SKY / OUTSIDE WORLD -->
      <a-sky id="sky" color="#6ea8ff"></a-sky>

      <!-- CLOUDS -->
      <a-entity id="clouds" position="0 0 0"></a-entity>

      <!-- CABIN SHELL -->
      <!-- Floor -->
      <a-box position="0 0 -3" depth="12" height="0.1" width="4" material="src: #fabric; repeat: 4 8"></a-box>
      <!-- Ceiling -->
      <a-box position="0 3 -3" depth="12" height="0.1" width="4" color="#e6eefc"></a-box>
      <!-- Back wall -->
      <a-plane position="0 1.5 -9" rotation="0 0 0" width="4" height="3" color="#e6eefc"></a-plane>
      <!-- Front wall -->
      <a-plane position="0 1.5 3" rotation="0 180 0" width="4" height="3" color="#e6eefc"></a-plane>

      <!-- LEFT WINDOWS -->
      <a-entity id="left-windows">
        <a-ring position="-2 1.5 -2" rotation="0 90 0" radius-inner="0.4" radius-outer="0.5" material="color: #cfd8dc"></a-ring>
        <a-circle position="-2.01 1.5 -2" rotation="0 90 0" radius="0.4"
                  material="color: #87ceeb; opacity: 0.5; transparent: true; side: double"></a-circle>

        <a-ring position="-2 1.5 -4" rotation="0 90 0" radius-inner="0.4" radius-outer="0.5" material="color: #cfd8dc"></a-ring>
        <a-circle position="-2.01 1.5 -4" rotation="0 90 0" radius="0.4"
                  material="color: #87ceeb; opacity: 0.5; transparent: true; side: double"></a-circle>

        <a-ring position="-2 1.5 -6" rotation="0 90 0" radius-inner="0.4" radius-outer="0.5" material="color: #cfd8dc"></a-ring>
        <a-circle position="-2.01 1.5 -6" rotation="0 90 0" radius="0.4"
                  material="color: #87ceeb; opacity: 0.5; transparent: true; side: double"></a-circle>
      </a-entity>

      <!-- RIGHT WINDOWS -->
      <a-entity id="right-windows">
        <a-ring position="2 1.5 -2" rotation="0 -90 0" radius-inner="0.4" radius-outer="0.5" material="color: #cfd8dc"></a-ring>
        <a-circle position="2.01 1.5 -2" rotation="0 -90 0" radius="0.4"
                  material="color: #87ceeb; opacity: 0.5; transparent: true; side: double"></a-circle>

        <a-ring position="2 1.5 -4" rotation="0 -90 0" radius-inner="0.4" radius-outer="0.5" material="color: #cfd8dc"></a-ring>
        <a-circle position="2.01 1.5 -4" rotation="0 -90 0" radius="0.4"
                  material="color: #87ceeb; opacity: 0.5; transparent: true; side: double"></a-circle>

        <a-ring position="2 1.5 -6" rotation="0 -90 0" radius-inner="0.4" radius-outer="0.5" material="color: #cfd8dc"></a-ring>
        <a-circle position="2.01 1.5 -6" rotation="0 -90 0" radius="0.4"
                  material="color: #87ceeb; opacity: 0.5; transparent: true; side: double"></a-circle>
      </a-entity>

      <!-- SEATS (Left side) -->
      <a-entity id="seats-left">
        <a-entity position="-1 0 -2">
          <a-box depth="0.6" height="0.2" width="0.6" position="0 0.2 0" color="#455a64"></a-box>
          <a-box depth="0.05" height="0.8" width="0.6" position="0 0.7 -0.25" color="#546e7a"></a-box>
        </a-entity>
        <a-entity position="-1 0 -4">
          <a-box depth="0.6" height="0.2" width="0.6" position="0 0.2 0" color="#455a64"></a-box>
          <a-box depth="0.05" height="0.8" width="0.6" position="0 0.7 -0.25" color="#546e7a"></a-box>
        </a-entity>
        <a-entity position="-1 0 -6">
          <a-box depth="0.6" height="0.2" width="0.6" position="0 0.2 0" color="#455a64"></a-box>
          <a-box depth="0.05" height="0.8" width="0.6" position="0 0.7 -0.25" color="#546e7a"></a-box>
        </a-entity>
      </a-entity>

      <!-- SEATS (Right side) -->
      <a-entity id="seats-right">
        <a-entity position="1 0 -2">
          <a-box depth="0.6" height="0.2" width="0.6" position="0 0.2 0" color="#455a64"></a-box>
          <a-box depth="0.05" height="0.8" width="0.6" position="0 0.7 -0.25" color="#546e7a"></a-box>
        </a-entity>
        <a-entity position="1 0 -4">
          <a-box depth="0.6" height="0.2" width="0.6" position="0 0.2 0" color="#455a64"></a-box>
          <a-box depth="0.05" height="0.8" width="0.6" position="0 0.7 -0.25" color="#546e7a"></a-box>
        </a-entity>
        <a-entity position="1 0 -6">
          <a-box depth="0.6" height="0.2" width="0.6" position="0 0.2 0" color="#455a64"></a-box>
          <a-box depth="0.05" height="0.8" width="0.6" position="0 0.7 -0.25" color="#546e7a"></a-box>
        </a-entity>
      </a-entity>

      <!-- CAMERA RIG -->
      <a-entity id="rig" position="-0.2 1.2 0">
        <a-entity id="camera" camera look-controls wasd-controls="enabled: false">
          <a-entity cursor="fuse: true; fuseTimeout: 1000"
                    position="0 0 -1"
                    geometry="primitive: ring; radiusInner: 0.01; radiusOuter: 0.015"
                    material="shader: flat; color: white">
          </a-entity>
        </a-entity>
      </a-entity>

      <!-- SOUNDS -->
      <a-entity id="engineSound" sound="src: #engine; autoplay: false; loop: true; volume: 0.2"></a-entity>
      <a-entity id="seatbeltSound" sound="src: #seatbelt; autoplay: false; loop: false; volume: 0.7"></a-entity>

      <!-- SCRIPT -->
      <script>
        // Clouds drifting outside only
        const cloudParent = document.querySelector('#clouds');
        for (let i = 0; i < 40; i++) {
          const c = document.createElement('a-entity');
          const size = 0.8 + Math.random() * 1.4;
          c.setAttribute('geometry', `primitive: sphere; radius: ${size}`);
          c.setAttribute('material', 'color: #ffffff; opacity: 0.85; side: double');

          // Position clouds far left or right, never inside
          const side = Math.random() < 0.5 ? -1 : 1;
          const x = side * (6 + Math.random() * 2);
          const y = 1 + Math.random() * 3;
          const z = -10 + Math.random() * 20;

          c.setAttribute('position', `${x} ${y} ${z}`);

          // Animate sideways drift
          const xTarget = x + (side * -2);
          c.setAttribute(
            'animation__move',
            `property: position; dir: alternate; dur: ${8000 + Math.random()*6000};
             to: ${xTarget} ${y} ${z}; loop: true; easing: easeInOutSine`
          );

          cloudParent.appendChild(c);
        }

        // Ensure sounds start on first user interaction
        window.addEventListener('click', () => {
          const scene = document.querySelector('a-scene');
          const sounds = scene.querySelectorAll('[sound]');
          sounds.forEach(s => {
            if (s.components.sound) s.components.sound.playSound();
          });
        }, { once: true });

        // Turbulence Logic
        let isTurbulenceOn = false;
        let turbFrame;
        const rig = document.querySelector('#rig');

        function startSoundsOnce() {
          const sounds = document.querySelectorAll('[sound]');
          sounds.forEach(s => {
            if (s.components.sound && !s.components.sound.isPlaying) {
              s.components.sound.playSound();
            }
          });
        }

        function toggleTurbulence() {
          if (isTurbulenceOn) {
            isTurbulenceOn = false;
            cancelAnimationFrame(turbFrame);
            // Reset to default
            rig.setAttribute('position', '-0.2 1.2 0');
            rig.setAttribute('rotation', '0 0 0');
            console.log("Turbulence Off");
          } else {
            isTurbulenceOn = true;
            console.log("Turbulence On");
            
            // Play seatbelt ding when turbulence starts
            const seatbelt = document.querySelector('#seatbeltSound');
            if (seatbelt && seatbelt.components.sound) {
              seatbelt.components.sound.playSound();
            }
            
            const basePos = { x: -0.2, y: 1.2, z: 0 };
            
            function shake() {
              if (!isTurbulenceOn) return;
              
              // Random jitter for position and rotation
              const pIntensity = 0.05; // Slightly increased for better effect
              const rIntensity = 0.6;  // Slightly increased for better effect
              
              const dx = (Math.random() - 0.5) * pIntensity;
              const dy = (Math.random() - 0.5) * pIntensity;
              const dz = (Math.random() - 0.5) * pIntensity;
              
              const rx = (Math.random() - 0.5) * rIntensity;
              const ry = (Math.random() - 0.5) * rIntensity;
              const rz = (Math.random() - 0.5) * rIntensity;
              
              rig.setAttribute('position', `${basePos.x + dx} ${basePos.y + dy} ${basePos.z + dz}`);
              rig.setAttribute('rotation', `${rx} ${ry} ${rz}`);
              
              turbFrame = requestAnimationFrame(shake);
            }
            shake();
          }
        }

        // Keyboard shortcut for turbulence
        window.addEventListener('keydown', (e) => {
          if (e.key.toLowerCase() === 't') { 
            startSoundsOnce(); 
            toggleTurbulence(); 
          }
        });
      </script>
    </a-scene>
  </body>
</html>
