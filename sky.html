<!DOCTYPE html>
<html>
  <head>
    <title>Skyscraper VR Exposure</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  </head>
  <body>
    <a-scene>
      <!-- 360° City Panorama Background (replace src with city of your choice) -->
      <a-sky id="sky" src="https://images.pexels.com/photos/3787839/pexels-photo-3787839.jpeg" rotation="0 -90 0"></a-sky>

      <!-- Skyscraper Tower -->
      <a-box position="0 -50 0" depth="20" height="100" width="20" color="#555"></a-box>

      <!-- Reflective Glass Floor -->
      <a-entity geometry="primitive: box; depth: 20; height: 0.2; width: 20"
                position="0 0 0"
                material="color: #FFFFFF; metalness: 0.9; roughness: 0.05; opacity: 0.15; transparent: true; sphericalEnvMap: #sky;">
      </a-entity>

      <!-- Railings -->
      <a-box position="10 0 0" depth="0.5" height="2" width="20" color="gray"></a-box>
      <a-box position="-10 0 0" depth="0.5" height="2" width="20" color="gray"></a-box>
      <a-box position="0 0 10" depth="20" height="2" width="0.5" color="gray"></a-box>
      <a-box position="0 0 -10" depth="20" height="2" width="0.5" color="gray"></a-box>

      <!-- Camera: Your View -->
      <a-entity camera look-controls wasd-controls position="0 2 0"></a-entity>
    </a-scene>
  </body>
</html>
